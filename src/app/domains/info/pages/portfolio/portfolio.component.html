<div class="container">

  <div class="mb-2">
    <div>
      <button mat-button mat-raised color="primary" (click)="isCollapsed = !isCollapsed">
        <mat-icon>filter_alt</mat-icon>
        Filter
      </button>
      <button mat-button mat-raised color="primary" (click)="ResetFilters()" [hidden]="!filtering">
        <mat-icon>filter_alt_off</mat-icon>
        Reset
      </button>
    </div>

    <div [collapse]="isCollapsed" [isAnimated]="true">
      <div class="border mb-2 shadow-sm" style="width: 250px;">
      <form>
        <div class="row mx-0">

          <div class="col">
            <small><b>Languages:</b></small>

            <div class="form-group">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input position-static me-2"
                  [(ngModel)]="java"
                  (change)="Filter()"
                  name="Java">
                <label class="form-check-label small">Java</label>
              </div>
            </div>

            <div class="form-group">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input position-static me-2"
                  [(ngModel)]="typescript"
                  (change)="Filter()"
                  name="Typescript">
                <label class="form-check-label small">TypeScript</label>
              </div>
            </div>

            <div class="form-group">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input position-static me-2"
                  [(ngModel)]="python"
                  (change)="Filter()"
                  name="Python">
                <label class="form-check-label small">Phyton</label>
              </div>
            </div>

            <!-- Other languages here -->

          </div>


          <div class="col">
            <small><b>Frameworks:</b></small>

            <div class="form-group">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input position-static me-2"
                  [(ngModel)]="spring"
                  (change)="Filter()"
                  name="Spring">
                <label class="form-check-label small">Spring Boot</label>
              </div>
            </div>

            <div class="form-group">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input position-static me-2"
                  [(ngModel)]="angular"
                  (change)="Filter()"
                  name="Angular">
                <label class="form-check-label small">Angular</label>
              </div>
            </div>

            <!-- Other frameworks here -->

          </div>


          <div class="col">
            <small><b>Other Skill:</b></small>

            <div class="form-group">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input position-static me-2"
                  [(ngModel)]="html"
                  (change)="Filter()"
                  name="Html">
                <label class="form-check-label small">Html</label>
              </div>
            </div>

            <div class="form-group">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input position-static me-2"
                  [(ngModel)]="css"
                  (change)="Filter()"
                  name="css">
                <label class="form-check-label small">CSS</label>
              </div>
            </div>

            <!-- Other Skills here -->

          </div>

        <!-- Other filter groups here -->

        </div>
      </form>
      </div>
    </div>
  </div>

  <!-- Project-card Pages -->
  <mat-divider></mat-divider>
  <h2>List Projects</h2>

  <div class="grid bm-8 pt-2 justify-content-center" >
    <div *ngFor="let project of projects"
      class="col-12 sm:col-4 md:col-3 xl:col-2" >
      <app-project-card [project]="project" />
    </div>
  </div>
